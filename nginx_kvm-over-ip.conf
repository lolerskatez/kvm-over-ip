# Nginx reverse proxy configuration for KVM-over-IP
# Place this file in /etc/nginx/sites-available/kvm-over-ip
# Then symlink: ln -s ../sites-available/kvm-over-ip /etc/nginx/sites-enabled/

upstream kvm_backend {
    # Gunicorn running on localhost:5000
    server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL/TLS Certificates (self-signed or Let's Encrypt)
    ssl_certificate     /etc/kvm/cert.pem;
    ssl_certificate_key /etc/kvm/key.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'" always;

    # Client limits
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Gzip compression for better bandwidth usage
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Logging
    access_log /var/log/kvm-over-ip/nginx_access.log;
    error_log /var/log/kvm-over-ip/nginx_error.log;

    # Root location
    location / {
        proxy_pass http://kvm_backend;
        
        # HTTP version (1.1 required for WebSocket)
        proxy_http_version 1.1;
        
        # Connection settings
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Buffering settings
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support for /ws endpoints
    location /ws/ {
        proxy_pass http://kvm_backend;
        
        # WebSocket-specific headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts (longer than HTTP)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 600s;
        
        # Don't buffer WebSocket traffic
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Video stream endpoint (disable buffering for real-time)
    location /stream {
        proxy_pass http://kvm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Disable buffering for MJPEG stream
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffer_size 4k;
        
        # Long timeout for streaming
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static files (CSS, JS, images)
    location /static/ {
        # Serve static files from backend or cache
        proxy_pass http://kvm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        # Cache static assets for 1 hour
        expires 1h;
        add_header Cache-Control "public, immutable";
        
        # Buffering is fine for static files
        proxy_buffering on;
    }

    # Health check endpoint (can be used for monitoring)
    location /ping {
        access_log off;
        proxy_pass http://kvm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
