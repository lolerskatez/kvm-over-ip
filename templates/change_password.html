<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — KVM-over-IP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: var(--spacing-lg);
        }
        
        .login-card {
            background-color: var(--color-bg-primary);
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 25px -5px var(--color-shadow-lg);
            padding: var(--spacing-2xl);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }
        
        .login-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--spacing-lg);
            background: linear-gradient(135deg, var(--color-warning) 0%, var(--color-warning-dark) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        
        .login-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0;
        }
        
        .login-subtitle {
            font-size: var(--text-sm);
            color: var(--color-text-tertiary);
            margin-top: var(--spacing-sm);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }
        
        .login-submit {
            font-weight: 600;
        }
        
        .login-footer {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }

        .password-requirements {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            padding: var(--spacing-md);
            background-color: var(--color-bg-secondary);
            border-radius: var(--radius-md);
            margin-top: var(--spacing-sm);
        }

        .password-requirements ul {
            margin: 0;
            padding-left: var(--spacing-lg);
        }

        .password-requirements li {
            margin: var(--spacing-xs) 0;
        }
        </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">⚠</div>
                <h1 class="login-title">Change Password</h1>
                <p class="login-subtitle">Required on first login for security</p>
            </div>
            
            {% if error %}
                <div class="alert alert-danger mb-lg">
                    {{ error }}
                </div>
            {% endif %}
            
            <form method="POST" class="login-form" data-validate="false">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="old_password" class="form-label">Current Password</label>
                    <input 
                        type="password" 
                        id="old_password" 
                        name="old_password" 
                        placeholder="Enter your current password"
                        required 
                        autocomplete="current-password"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="new_password" class="form-label">New Password</label>
                    <input 
                        type="password" 
                        id="new_password" 
                        name="new_password" 
                        placeholder="Enter new password (minimum 8 characters)"
                        required 
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <div class="password-requirements">
                        <strong>Password requirements:</strong>
                        <ul>
                            <li>At least 8 characters long</li>
                            <li>Should be strong and unique</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        placeholder="Re-enter new password"
                        required 
                        autocomplete="new-password"
                        minlength="8"
                    >
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg login-submit">
                    Change Password
                </button>
            </form>

            <div class="login-footer">
                KVM-over-IP • Secure Remote Console System
            </div>
        </div>
    </div>
</body>
</html>
